<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite Rain Fade Monitor</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css"> <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

<div id="map"></div>

<aside class="dashboard-overlay">
    <div class="header">
        <h1>🛰️ STARLINK MONITOR</h1>
        <p id="update-time">Sincronizando telemetría...</p>
    </div>

    <div class="stat-group">
        <div class="stat-card">
            <div class="stat-label">Ubicación</div>
            <div class="stat-value" id="isla-nombre">Cargando...</div>
        </div>

        <div class="stat-card">
            <div class="stat-label">Clima Actual</div>
            <div class="stat-value" id="clima-desc">--</div>
        </div>

        <div class="stat-card">
            <div class="stat-label">Satélites en rango</div>
            <div class="stat-value"><span id="sat-count">0</span> unidades</div>
        </div>

        <div class="risk-display" id="risk-box">
            <div class="stat-label" style="color: inherit">Riesgo Rain Fade</div>
            <div class="stat-value" id="riesgo" style="font-size: 1.8rem;">---</div>
        </div>
    </div>

    <button class="refresh-btn" onclick="actualizarDashboard()">
        🔄 ACTUALIZAR DATOS
    </button>
</aside>

<script>
    // Configuración inicial
    let isFirstLoad = true;
    let currentMarker;
    let satelliteMarkers = [];
    const islandCoords = [28.12, -15.43];

    // 1. Inicialización del Mapa
    const map = L.map('map', { zoomControl: false }).setView([28.4, -15.8], 8);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    // 2. Función Principal
    function actualizarDashboard() {
        fetch('/api/rainfade/Las-Palmas')
            .then(res => res.json())
            .then(data => {
                const p = data.predictions[0];
                const timestamp = new Date().toLocaleTimeString();

                // Actualizar Textos
                document.getElementById('update-time').innerText = `Última actualización: ${timestamp}`;
                document.getElementById('isla-nombre').innerText = data.location;
                document.getElementById('clima-desc').innerText = `${p.weather.description} (${p.weather.temperature}ºC)`;
                document.getElementById('sat-count').innerText = p.satellitesInView.length;
                document.getElementById('riesgo').innerText = p.rainFadeRisk;
                document.getElementById('risk-box').className = `risk-display risk-${p.rainFadeRisk}`;

                // Marcador de la Isla
                if (currentMarker) map.removeLayer(currentMarker);
                currentMarker = L.circleMarker(islandCoords, {
                    radius: 12,
                    fillColor: getRiskColor(p.rainFadeRisk),
                    color: "white", weight: 2, fillOpacity: 0.8
                }).addTo(map);
                currentMarker.bindPopup(`<b>${data.location}</b><br>Riesgo: ${p.rainFadeRisk}`);

                // 🛰️ Marcadores de Satélites
                satelliteMarkers.forEach(m => map.removeLayer(m));
                satelliteMarkers = [];
                p.satellitesInView.forEach(sat => {
                    const m = L.circleMarker([sat.lat, sat.lon], {
                        radius: 6, fillColor: "#00d2ff", color: "#fff", weight: 1, fillOpacity: 0.9
                    }).addTo(map);
                    m.bindTooltip(`Sat: ${sat.id}`);
                    satelliteMarkers.push(m);
                });

                // Control de Cámara
                if (isFirstLoad) {
                    map.flyTo(islandCoords, 9, { duration: 1.5 });
                    currentMarker.openPopup();
                    isFirstLoad = false;
                }
            })
            .catch(err => console.error("Error API:", err));
    }

    function getRiskColor(risk) {
        const colors = { 'HIGH': '#ff3366', 'MEDIUM': '#ffcc00' };
        return colors[risk] || '#00ff88';
    }

    setInterval(actualizarDashboard, 5000);
    actualizarDashboard();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite Rain Fade Monitor</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

<div id="map"></div>

<aside class="dashboard-overlay">
    <div class="header">
        <div class="live-status">
            <span class="dot"></span> LIVE TELEMETRY
        </div>
        <h1>🛰️ STARLINK MONITOR</h1>
        <p id="update-time">Sincronizando...</p>
    </div>

    <div class="stat-group">
        <div class="stat-card">
            <div class="stat-label">Ubicación</div>
            <div class="stat-value" id="isla-nombre">--</div>
        </div>

        <div class="stat-card">
            <div class="stat-label">Clima Actual</div>
            <div class="stat-value" id="clima-desc">--</div>
        </div>

        <div class="stat-card">
            <div class="stat-label">Satélites en rango</div>
            <div class="stat-value"><span id="sat-count">0</span> unidades</div>
        </div>

        <div class="risk-display" id="risk-box">
            <div class="stat-label" style="color: inherit">Riesgo Rain Fade</div>
            <div class="stat-value" id="riesgo" style="font-size: 1.8rem;">---</div>
        </div>
    </div>

    <button class="refresh-btn" onclick="actualizarDashboard()">
        🔄 ACTUALIZAR DATOS
    </button>
</aside>

<script>
    let isFirstLoad = true;
    let currentMarker;
    let satelliteMarkers = [];
    let connectionLines = [];
    const islandCoords = [28.12, -15.43];

    // 1. Inicialización del Mapa
    const map = L.map('map', { zoomControl: false }).setView([28.4, -15.8], 8);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    const satelliteIcon = L.divIcon({
        html: '<span class="sat-emoji">🛰️</span>',
        className: 'sat-marker-container',
        iconSize: [24, 24],
        iconAnchor: [12, 12]
    });

    function actualizarDashboard() {
        fetch('/api/rainfade/Las-Palmas')
            .then(res => {
                if (!res.ok) throw new Error("Servidor no disponible");
                return res.json();
            })
            .then(data => {
                const p = data.predictions[0];
                const timestamp = new Date().toLocaleTimeString();

                // Normalizamos el riesgo para evitar errores de mayúsculas/minúsculas
                const riesgoNormalizado = p.rainFadeRisk.toUpperCase().trim();

                document.getElementById('update-time').innerText = `Actualizado: ${timestamp}`;
                document.getElementById('update-time').style.color = "rgba(255,255,255,0.6)";
                document.getElementById('isla-nombre').innerText = data.location;

                document.getElementById('clima-desc').innerText = `${p.weather.description} (${p.weather.temperature.toFixed(1)}ºC)`;
                document.getElementById('sat-count').innerText = p.satellitesInView.length;
                document.getElementById('riesgo').innerText = riesgoNormalizado;
                document.getElementById('risk-box').className = `risk-display risk-${riesgoNormalizado}`;

                // Marcador de la Isla
                if (currentMarker) map.removeLayer(currentMarker);
                currentMarker = L.circleMarker(islandCoords, {
                    radius: 12,
                    fillColor: getRiskColor(riesgoNormalizado),
                    color: "white", weight: 2, fillOpacity: 0.8
                }).addTo(map);
                currentMarker.bindPopup(`<b>${data.location}</b><br>Riesgo: ${riesgoNormalizado}`);

                // Limpiar satélites y líneas anteriores
                satelliteMarkers.forEach(m => map.removeLayer(m));
                connectionLines.forEach(l => map.removeLayer(l));
                satelliteMarkers = [];
                connectionLines = [];

                p.satellitesInView.forEach(sat => {
                    if (sat.lat !== 0 || sat.lon !== 0) {
                        // Crear Marcador
                        const m = L.marker([sat.lat, sat.lon], { icon: satelliteIcon }).addTo(map);
                        m.bindTooltip(`ID: ${sat.id}`, { direction: 'top', offset: [0, -10] });
                        satelliteMarkers.push(m);

                        // --- CORRECCIÓN AQUÍ ---
                        // Solo dibujamos la línea si el riesgo es MEDIUM o HIGH
                        if (riesgoNormalizado === 'MEDIUM' || riesgoNormalizado === 'HIGH') {
                            const line = L.polyline([islandCoords, [sat.lat, sat.lon]], {
                                color: getRiskColor(riesgoNormalizado),
                                weight: 1.5,
                                opacity: 0.5,
                                dashArray: '5, 10'
                            }).addTo(map);
                            connectionLines.push(line);
                        }
                    }
                });

                if (isFirstLoad) {
                    map.flyTo(islandCoords, 9, { duration: 1.5 });
                    isFirstLoad = false;
                }
            })
            .catch(err => {
                console.error("Error API:", err);
                document.getElementById('update-time').innerText = "⚠️ ERROR DE CONEXIÓN";
                document.getElementById('update-time').style.color = "#ff3366";
            });
    }

    function getRiskColor(risk) {
        // Aseguramos que la función también reciba el riesgo normalizado
        const r = risk.toUpperCase().trim();
        const colors = { 'HIGH': '#ff3366', 'MEDIUM': '#ffcc00', 'LOW': '#00ff88' };
        return colors[r] || '#00ff88';
    }

    setInterval(actualizarDashboard, 5000);
    actualizarDashboard();
</script>

</body>
</html>
